<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Admin Dashboard</h1>
  <div id="urlList"></div>
</div>

<script>
async function loadUrls() {
  const res = await fetch("/admin/urls");
  const data = await res.json();

  const list = document.getElementById("urlList");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="card">
        <strong>${item.shortCode}</strong><br>
        ${item.originalUrl}<br>
        Clicks: ${item.clicks}<br>
        <button onclick="deleteUrl('${item.shortCode}')">Delete</button>
      </div>
    `;
  });
}

async function deleteUrl(code) {
  await fetch("/admin/delete/" + code, { method: "DELETE" });
  loadUrls();
}

loadUrls();
setInterval(loadUrls, 5000);
</script>

</body>
</html>
